<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QWERTY Typing Trainer with Finger Guide</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --keyboard-bg: #1e293b;
            --key-bg: #334155;
            --text-color: #f8fafc;
            --glow-color: #38bdf8;
            --target-glow: #eab308; 
            --error-color: #ef4444;
            --finger-glow: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Display View Dashboard */
        .display-section {
            height: 35vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 15px;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }
        .top-bar { display: flex; gap: 15px; align-items: center; }
        .selector { background-color: var(--key-bg); color: white; border: 2px solid #475569; padding: 6px 12px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-mode { background-color: var(--key-bg); color: white; border: 2px solid transparent; padding: 6px 14px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-mode.active { background-color: #0284c7; border-color: var(--glow-color); box-shadow: 0 0 10px var(--glow-color); }
        .lesson-box { background-color: rgba(30, 41, 59, 0.8); border: 2px dashed #475569; padding: 10px 20px; border-radius: 8px; font-size: 24px; text-align: center; max-width: 85%; }
        .lesson-box span.next-char { color: var(--target-glow); font-weight: bold; text-decoration: underline; text-shadow: 0 0 8px var(--target-glow); }
        .ribbon-container { width: 90%; max-width: 900px; background: #1e293b; padding: 10px 15px; border-radius: 6px; border-left: 4px solid var(--glow-color); overflow: hidden; white-space: nowrap; }
        .ribbon-text { display: inline-block; font-size: 26px; font-weight: bold; color: #ffffff; min-width: 100%; text-align: left; }

        /* Keyboard View Layout */
        .keyboard-section { height: 42vh; background-color: var(--keyboard-bg); display: flex; justify-content: center; align-items: center; padding: 10px; border-top: 3px solid #334155; }
        .keyboard { display: flex; flex-direction: column; gap: 5px; width: 100%; max-width: 950px; background-color: #0f172a; padding: 10px; border-radius: 10px; }
        .row { display: flex; justify-content: center; gap: 4px; width: 100%; }
        .key { background-color: var(--key-bg); border: 1px solid #475569; border-radius: 5px; color: var(--text-color); height: 46px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 4px 6px; cursor: pointer; user-select: none; }
        .key .eng-label { font-size: 14px; font-weight: bold; }
        .key .mal-label { font-size: 12px; color: #94a3b8; align-self: flex-end; font-weight: bold; }
        
        .key.target-guide { background-color: #854d0e !important; border: 2px solid var(--target-glow); box-shadow: 0 0 12px var(--target-glow); animation: pulse 0.8s infinite alternate; }
        .key.active { background-color: var(--glow-color) !important; box-shadow: 0 0 15px var(--glow-color) !important; transform: scale(0.95); }
        .key.wrong-active { background-color: var(--error-color) !important; box-shadow: 0 0 15px var(--error-color) !important; }
        .key.active .eng-label, .key.active .mal-label { color: #000 !important; }

        .key.backspace { flex: 1.8; align-items: center; justify-content: center; }
        .key.caps { flex: 1.5; align-items: center; justify-content: center; }
        .key.enter { flex: 1.8; align-items: center; justify-content: center; }
        .key.shift { flex: 2; align-items: center; justify-content: center; }
        .key.space { flex: 8; justify-content: center; align-items: center; }

        /* Hands & Fingers Animation Dashboard Panels */
        .hands-section { height: 23vh; background-color: #0f172a; display: flex; justify-content: center; gap: 120px; align-items: center; border-top: 2px solid #1e293b; padding: 5px; }
        .hand-container { display: flex; gap: 12px; align-items: flex-end; }
        .finger-node { background-color: #334155; border: 2px solid #475569; border-radius: 20px 20px 5px 5px; width: 32px; color: white; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 8px; transition: all 0.2s; }
        
        /* Dynamic Height setup for natural hand looks */
        #L5, #R5 { height: 60px; } /* Pinky */
        #L4, #R4 { height: 80px; } /* Ring */
        #L3, #R3 { height: 90px; } /* Middle */
        #L2, #R2 { height: 82px; } /* Index */
        #L1, #R1 { height: 45px; border-radius: 15px; width: 36px; } /* Thumb */

        /* Animated Active Finger state */
        .finger-node.finger-blink {
            background-color: var(--finger-glow) !important;
            border-color: #4ade80 !important;
            box-shadow: 0 0 20px var(--finger-glow);
            transform: translateY(-8px);
            color: black !important;
        }
    </style>
</head>
<body>

    <div class="display-section">
        <div class="top-bar">
            <button class="btn-mode active" id="btn-en" onclick="setLanguage('EN')">ENGLISH</button>
            <button class="btn-mode" id="btn-ml" onclick="setLanguage('ML')">മലയാളം</button>
            <select class="selector" id="lessonSelect" onchange="loadLesson()">
                <option value="1">Class 1: Home Row Base</option>
                <option value="2">Class 2: Top Row Reach</option>
                <option value="3">Class 3: Bottom Row Reach</option>
                <option value="4">Class 4: Word Training</option>
            </select>
            <button class="btn-mode" style="background-color: #ef4444;" onclick="resetApp()">Reset</button>
        </div>
        <div class="lesson-box" id="targetBox">Loading...</div>
        <div class="ribbon-container"><div class="ribbon-text" id="ribbonDisplay"></div></div>
    </div>

    <div class="keyboard-section">
        <div class="keyboard" id="keyboardContainer"></div>
    </div>

    <div class="hands-section">
        <div class="hand-container">
            <div class="finger-node" id="L5"><span>P</span></div>
            <div class="finger-node" id="L4"><span>R</span></div>
            <div class="finger-node" id="L3"><span>M</span></div>
            <div class="finger-node" id="L2"><span>I</span></div>
            <div class="finger-node" id="L1"><span>T</span></div>
        </div>
        <div class="hand-container">
            <div class="finger-node" id="R1"><span>T</span></div>
            <div class="finger-node" id="R2"><span>I</span></div>
            <div class="finger-node" id="R3"><span>M</span></div>
            <div class="finger-node" id="R4"><span>R</span></div>
            <div class="finger-node" id="R5"><span>P</span></div>
        </div>
    </div>

    <script>
        let currentLang = 'EN'; let typedText = ''; let currentTargetText = '';

        const lessons = {
            EN: { 1: ["asdf jkl;", "ff jj ss kk aa ll"], 2: ["quiet row type", "wet red power"], 3: ["pack box zinc", "lazy dog fox"], 4: ["kerala computer code"] },
            ML: { 1: ["കഖഗഘ ങചഛജ", "കജ ഖഛ ഗച"], 2: ["ഞതഭര തഉഇഎ", "അമ്മ ആന ഇല"], 3: ["ടഠഡഢ ണതഥദ", "പന്ത് മരം തറ"], 4: ["കേരളം കമ്പ്യൂട്ടർ"] }
        };

        const pcKeyboardRows = [
            [
                {code: 'KeyQ', eng: 'Q', mal: 'ഞ', finger: 'L5'}, {code: 'KeyW', eng: 'W', mal: 'ത', finger: 'L4'}, {code: 'KeyE', eng: 'E', mal: 'ഭ', finger: 'L3'}, 
                {code: 'KeyR', eng: 'R', mal: 'ര', finger: 'L2'}, {code: 'KeyT', eng: 'T', mal: 'സ', finger: 'L2'}, {code: 'KeyY', eng: 'Y', mal: 'ഉ', finger: 'R2'}, 
                {code: 'KeyU', eng: 'U', mal: 'ഇ', finger: 'R2'}, {code: 'KeyI', eng: 'I', mal: 'എ', finger: 'R3'}, {code: 'KeyO', eng: 'O', mal: 'ഒ', finger: 'R4'}, 
                {code: 'KeyP', eng: 'P', mal: 'പ', finger: 'R5'}, {code: 'Backspace', eng: 'Backspace', mal: '←', class: 'backspace', finger: 'R5'}
            ],
            [
                {code: 'CapsLock', eng: 'Caps', mal: 'Caps', class: 'caps'},
                {code: 'KeyA', eng: 'A', mal: 'ക', finger: 'L5'}, {code: 'KeyS', eng: 'S', mal: 'ഖ', finger: 'L4'}, {code: 'KeyD', eng: 'D', mal: 'ഗ', finger: 'L3'}, 
                {code: 'KeyF', eng: 'F', mal: 'ഘ', finger: 'L2'}, {code: 'KeyG', eng: 'G', mal: 'ങ', finger: 'L2'}, {code: 'KeyH', eng: 'H', mal: 'ച', finger: 'R2'}, 
                {code: 'KeyJ', eng: 'J', mal: 'ഛ', finger: 'R2'}, {code: 'KeyK', eng: 'K', mal: 'ജ', finger: 'R3'}, {code: 'KeyL', eng: 'L', mal: 'ഝ', finger: 'R4'}, 
                {code: 'Semicolon', eng: ';', mal: 'യ', finger: 'R5'}, {code: 'Enter', eng: 'Enter', mal: '↵', class: 'enter', finger: 'R5'}
            ],
            [
                {code: 'ShiftLeft', eng: 'Shift', mal: 'Shift', class: 'shift'},
                {code: 'KeyZ', eng: 'Z', mal: 'ട', finger: 'L5'}, {code: 'KeyX', eng: 'X', mal: 'ഠ', finger: 'L4'}, {code: 'KeyC', eng: 'C', mal: 'ഡ', finger: 'L3'}, 
                {code: 'KeyV', eng: 'V', mal: 'ഢ', finger: 'L2'}, {code: 'KeyB', eng: 'B', mal: 'ണ', finger: 'L2'}, {code: 'KeyN', eng: 'N', mal: 'ന', finger: 'R2'}, 
                {code: 'KeyM', eng: 'M', mal: 'ഥ', finger: 'R2'}, {code: 'Comma', eng: ',', mal: 'ദ', finger: 'R3'}, {code: 'Period', eng: '.', mal: 'ധ', finger: 'R4'},
                {code: 'Slash', eng: '/', mal: 'ല', finger: 'R5'}
            ],
            [ {code: 'Space', eng: 'Space', mal: ' ', class: 'space', finger: 'R1'} ]
        ];

        function renderKeyboard() {
            const container = document.getElementById('keyboardContainer'); container.innerHTML = '';
            pcKeyboardRows.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'row';
                row.forEach(key => {
                    const btn = document.createElement('button'); btn.className = `key ${key.class || ''}`; btn.id = key.code;
                    btn.innerHTML = key.class ? `<span class="eng-label" style="align-self:center;">${key.eng}</span>` : `<span class="eng-label">${key.eng}</span><span class="mal-label">${key.mal}</span>`;
                    btn.onclick = () => triggerKey(key.code);
                    rowDiv.appendChild(btn);
                });
                container.appendChild(rowDiv);
            });
            updateTargetUI();
        }

        function loadLesson() {
            const list = lessons[currentLang][document.getElementById('lessonSelect').value];
            currentTargetText = list[Math.floor(Math.random() * list.length)]; typedText = '';
            updateTargetUI(); document.getElementById('ribbonDisplay').innerText = '';
        }

        function updateTargetUI() {
            // Target Box Layout logic
            const box = document.getElementById('targetBox'); let progress = typedText.length;
            if (progress >= currentTargetText.length) {
                box.innerHTML = `<span style='color:#22c55e; font-weight:bold;'>Excellent! Next...</span>`;
                setTimeout(loadLesson, 1200); return;
            }
            let typedPart = currentTargetText.substring(0, progress); let nextChar = currentTargetText.charAt(progress); let remaining = currentTargetText.substring(progress + 1);
            box.innerHTML = `<span style="color:#22c55e;">${typedPart}</span><span class="next-char">${nextChar === ' ' ? '␣' : nextChar}</span><span>${remaining}</span>`;

            // Active Key & Finger Track engine
            document.querySelectorAll('.key').forEach(k => k.classList.remove('target-guide'));
            document.querySelectorAll('.finger-node').forEach(f => f.classList.remove('finger-blink'));

            let targetCode = '', fingerId = '';
            if (nextChar === ' ') { targetCode = 'Space'; fingerId = 'R1'; }
            else {
                pcKeyboardRows.forEach(row => row.forEach(k => {
                    let c = currentLang === 'EN' ? k.eng : k.mal;
                    if(c && c.toLowerCase() === nextChar.toLowerCase()) { targetCode = k.code; fingerId = k.finger; }
                }));
            }
            if (targetCode) document.getElementById(targetCode)?.classList.add('target-guide');
            if (fingerId) document.getElementById(fingerId)?.classList.add('finger-blink');
        }

        function triggerKey(code) {
            if (code === 'Backspace') { typedText = typedText.slice(0, -1); updateTargetUI(); document.getElementById('ribbonDisplay').innerText = typedText; return; }
            if (typedText.length >= currentTargetText.length) return;

            let expected = currentTargetText.charAt(typedText.length);
            let activeKey = null;
            pcKeyboardRows.forEach(row => row.forEach(k => { if(k.code === code) activeKey = k; }));
            if (!activeKey && code !== 'Space') return;

            let inputChar = code === 'Space' ? ' ' : (currentLang === 'EN' ? activeKey.eng : activeKey.mal);
            const keyEl = document.getElementById(code);

            if (inputChar && (inputChar.toLowerCase() === expected.toLowerCase() || (code === 'Space' && expected === ' '))) {
                typedText += expected; updateTargetUI(); document.getElementById('ribbonDisplay').innerText = typedText;
                keyEl?.classList.add('active'); setTimeout(() => keyEl?.classList.remove('active'), 100);
            } else {
                keyEl?.classList.add('wrong-active'); setTimeout(() => keyEl?.classList.remove('wrong-active'), 150);
            }
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') e.preventDefault(); triggerKey(e.code); });
        function setLanguage(lang) { currentLang = lang; document.getElementById('btn-en').classList.toggle('active', lang === 'EN'); document.getElementById('btn-ml').classList.toggle('active', lang === 'ML'); loadLesson(); renderKeyboard(); }
        function resetApp() { typedText = ''; loadLesson(); }
        setTimeout(() => { loadLesson(); renderKeyboard(); }, 200);
    </script>
</body>
</html>
