<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate QWERTY Typing Trainer - Malayalam & English</title>
    <style>
        :root {
            --bg-color: #0f172a; --keyboard-bg: #1e293b; --key-bg: #334155;
            --text-color: #f8fafc; --glow-color: #38bdf8; --target-glow: #eab308; 
            --error-color: #ef4444; --finger-glow: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Dashboard View */
        .display-section {
            height: 30vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 10px 15px;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }
        .top-bar { display: flex; gap: 15px; align-items: center; }
        .selector { background-color: var(--key-bg); color: white; border: 2px solid #475569; padding: 5px 10px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-mode { background-color: var(--key-bg); color: white; border: 2px solid transparent; padding: 5px 12px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-mode.active { background-color: #0284c7; border-color: var(--glow-color); box-shadow: 0 0 10px var(--glow-color); }
        .lesson-box { background-color: rgba(30, 41, 59, 0.8); border: 2px dashed #475569; padding: 8px 15px; border-radius: 8px; font-size: 24px; text-align: center; max-width: 85%; }
        .lesson-box span.next-char { color: var(--target-glow); font-weight: bold; text-decoration: underline; text-shadow: 0 0 8px var(--target-glow); }
        .ribbon-container { width: 90%; max-width: 900px; background: #1e293b; padding: 8px 15px; border-radius: 6px; border-left: 4px solid var(--glow-color); overflow: hidden; white-space: nowrap; }
        .ribbon-text { display: inline-block; font-size: 24px; font-weight: bold; color: #ffffff; min-width: 100%; text-align: left; }

        /* Full Keyboard Section */
        .keyboard-section { height: 48vh; background-color: var(--keyboard-bg); display: flex; justify-content: center; align-items: center; padding: 5px; border-top: 3px solid #334155; }
        .keyboard { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 1000px; background-color: #0f172a; padding: 10px; border-radius: 10px; }
        .row { display: flex; justify-content: center; gap: 4px; width: 100%; }
        .key { background-color: var(--key-bg); border: 1px solid #475569; border-radius: 5px; color: var(--text-color); height: 42px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 2px 4px; cursor: pointer; user-select: none; }
        .key .eng-label { font-size: 12px; font-weight: bold; }
        .key .mal-label { font-size: 12px; color: #38bdf8; align-self: flex-end; font-weight: bold; }
        
        .key.target-guide { background-color: #854d0e !important; border: 2px solid var(--target-glow); box-shadow: 0 0 12px var(--target-glow); animation: pulse 0.8s infinite alternate; }
        .key.active { background-color: var(--glow-color) !important; box-shadow: 0 0 15px var(--glow-color) !important; transform: scale(0.95); }
        .key.wrong-active { background-color: var(--error-color) !important; box-shadow: 0 0 15px var(--error-color) !important; }
        .key.active .eng-label, .key.active .mal-label { color: #000 !important; }

        .key.backspace { flex: 1.8; align-items: center; justify-content: center; }
        .key.tab { flex: 1.5; align-items: center; justify-content: center; }
        .key.caps { flex: 1.8; align-items: center; justify-content: center; }
        .key.enter { flex: 2.2; align-items: center; justify-content: center; }
        .key.shift { flex: 2.5; align-items: center; justify-content: center; }
        .key.space { flex: 8; justify-content: center; align-items: center; }

        /* Finger Animations */
        .hands-section { height: 22vh; background-color: #0f172a; display: flex; justify-content: center; gap: 120px; align-items: center; border-top: 2px solid #1e293b; padding: 5px; }
        .hand-container { display: flex; gap: 12px; align-items: flex-end; }
        .finger-node { background-color: #334155; border: 2px solid #475569; border-radius: 20px 20px 5px 5px; width: 32px; color: white; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 8px; transition: all 0.2s; }
        
        #L5, #R5 { height: 60px; } #L4, #R4 { height: 80px; } #L3, #R3 { height: 90px; } #L2, #R2 { height: 82px; } #L1, #R1 { height: 45px; border-radius: 15px; width: 36px; } 

        .finger-node.finger-blink { background-color: var(--finger-glow) !important; border-color: #4ade80 !important; box-shadow: 0 0 20px var(--finger-glow); transform: translateY(-8px); color: black !important; }
    </style>
</head>
<body>

    <div class="display-section">
        <div class="top-bar">
            <button class="btn-mode active" id="btn-en" onclick="setLanguage('EN')">ENGLISH</button>
            <button class="btn-mode" id="btn-ml" onclick="setLanguage('ML')">മലയാളം</button>
            <select class="selector" id="lessonSelect" onchange="loadLesson()">
                <option value="1">Class 1: Home Row Focus</option>
                <option value="2">Class 2: Top Row Reach</option>
                <option value="3">Class 3: Bottom Row Reach</option>
                <option value="4">Class 4: Capital & Shift Layout</option>
                <option value="5">Class 5: Short Sentences</option>
                <option value="6">Class 6: ചില്ലക്ഷരങ്ങൾ (ർ ൽ ൾ ൻ ൺ)</option>
            </select>
            <button class="btn-mode" style="background-color: #ef4444;" onclick="resetApp()">Reset</button>
        </div>
        <div class="lesson-box" id="targetBox">Loading...</div>
        <div class="ribbon-container"><div class="ribbon-text" id="ribbonDisplay"></div></div>
    </div>

    <div class="keyboard-section">
        <div class="keyboard" id="keyboardContainer"></div>
    </div>

    <div class="hands-section">
        <div class="hand-container">
            <div class="finger-node" id="L5"><span>P</span></div>
            <div class="finger-node" id="L4"><span>R</span></div>
            <div class="finger-node" id="L3"><span>M</span></div>
            <div class="finger-node" id="L2"><span>I</span></div>
            <div class="finger-node" id="L1"><span>T</span></div>
        </div>
        <div class="hand-container">
            <div class="finger-node" id="R1"><span>T</span></div>
            <div class="finger-node" id="R2"><span>I</span></div>
            <div class="finger-node" id="R3"><span>M</span></div>
            <div class="finger-node" id="R4"><span>R</span></div>
            <div class="finger-node" id="R5"><span>P</span></div>
        </div>
    </div>

    <script>
        let currentLang = 'EN'; let typedText = ''; let currentTargetText = ''; let isShiftPressed = false;

        const lessons = {
            EN: { 
                1: ["asdf jkl; asdf jkl;"], 2: ["quiet row type pure"], 3: ["pack box zinc matrix"], 
                4: ["Kerala India Malappuram"], 5: ["Practice builds great muscle memory."],
                6: ["1 2 3 4 5 6 7 8 9 0", "! @ # $ % ^ & * ( )"]
            },
            ML: { 
                1: ["കഗങ ചജഞ"], 2: ["തഉഇഎ ഒഔ"], 3: ["ടഡണ തദധന"], 
                4: ["ഖഘ ഛഝ ഠഢ ഥധ ഫഭ"], 5: ["കേരളം എൻ്റെ നാടാണ്"], 
                6: ["അവർ മയിൽ അവൾ അവൻ കൺമണി", "മക്കൾ അർദ്ധരാത്രി പോയവൻ"] 
            }
        };

        // Complete PC Keyboard with Number Row & Chillus (Shift + 3,4,5,6,7)
        const pcKeyboardRows = [
            // Row 1: Numbers & Chillus
            [
                {code: 'Backquote', normal: {eng: '`', mal: 'ൊ', finger: 'L5'}, shifted: {eng: '~', mal: 'ഓ', finger: 'L5'}},
                {code: 'Digit1', normal: {eng: '1', mal: '1', finger: 'L5'}, shifted: {eng: '!', mal: '!', finger: 'L5'}},
                {code: 'Digit2', normal: {eng: '2', mal: '2', finger: 'L4'}, shifted: {eng: '@', mal: '@', finger: 'L4'}},
                {code: 'Digit3', normal: {eng: '3', mal: '3', finger: 'L3'}, shifted: {eng: '#', mal: 'ർ', finger: 'L3'}},
                {code: 'Digit4', normal: {eng: '4', mal: '4', finger: 'L2'}, shifted: {eng: '$', mal: 'ൽ', finger: 'L2'}},
                {code: 'Digit5', normal: {eng: '5', mal: '5', finger: 'L2'}, shifted: {eng: '%', mal: 'ൾ', finger: 'L2'}},
                {code: 'Digit6', normal: {eng: '6', mal: '6', finger: 'R2'}, shifted: {eng: '^', mal: 'ൺ', finger: 'R2'}},
                {code: 'Digit7', normal: {eng: '7', mal: '7', finger: 'R2'}, shifted: {eng: '&', mal: 'ൻ', finger: 'R2'}},
                {code: 'Digit8', normal: {eng: '8', mal: '8', finger: 'R3'}, shifted: {eng: '*', mal: 'ൿ', finger: 'R3'}},
                {code: 'Digit9', normal: {eng: '9', mal: '9', finger: 'R4'}, shifted: {eng: '(', mal: '(', finger: 'R4'}},
                {code: 'Digit0', normal: {eng: '0', mal: '0', finger: 'R5'}, shifted: {eng: ')', mal: ')', finger: 'R5'}},
                {code: 'Minus', normal: {eng: '-', mal: '-', finger: 'R5'}, shifted: {eng: '_', mal: 'ഃ', finger: 'R5'}},
                {code: 'Equal', normal: {eng: '=', mal: '=', finger: 'R5'}, shifted: {eng: '+', mal: 'ൃ', finger: 'R5'}},
                {code: 'Backspace', normal: {eng: 'Bksp', mal: '←', class: 'backspace', finger: 'R5'}, shifted: {eng: 'Bksp', mal: '←', class: 'backspace', finger: 'R5'}}
            ],
            // Row 2
            [
                {code: 'Tab', normal: {eng: 'Tab', mal: 'Tab', class: 'tab', finger: 'L5'}, shifted: {eng: 'Tab', mal: 'Tab', class: 'tab', finger: 'L5'}},
                {code: 'KeyQ', normal: {eng: 'q', mal: 'ഞ', finger: 'L5'}, shifted: {eng: 'Q', mal: 'ഔ', finger: 'L5'}},
                {code: 'KeyW', normal: {eng: 'w', mal: 'ത', finger: 'L4'}, shifted: {eng: 'W', mal: 'ഐ', finger: 'L4'}},
                {code: 'KeyE', normal: {eng: 'e', mal: 'ഭ', finger: 'L3'}, shifted: {eng: 'E', mal: 'ആ', finger: 'L3'}},
                {code: 'KeyR', normal: {eng: 'r', mal: 'ര', finger: 'L2'}, shifted: {eng: 'R', mal: 'ഈ', finger: 'L2'}},
                {code: 'KeyT', normal: {eng: 't', mal: 'സ', finger: 'L2'}, shifted: {eng: 'T', mal: 'ഊ', finger: 'L2'}},
                {code: 'KeyY', normal: {eng: 'y', mal: 'ഉ', finger: 'R2'}, shifted: {eng: 'Y', mal: 'ള', finger: 'R2'}},
                {code: 'KeyU', normal: {eng: 'u', mal: 'ഇ', finger: 'R2'}, shifted: {eng: 'U', mal: 'ങ', finger: 'R2'}},
                {code: 'KeyI', normal: {eng: 'i', mal: 'എ', finger: 'R3'}, shifted: {eng: 'I', mal: 'ഘ', finger: 'R3'}},
                {code: 'KeyO', normal: {eng: 'o', mal: 'ഒ', finger: 'R4'}, shifted: {eng: 'O', mal: 'ധ', finger: 'R4'}},
                {code: 'KeyP', normal: {eng: 'p', mal: 'പ', finger: 'R5'}, shifted: {eng: 'P', mal: 'ഝ', finger: 'R5'}},
                {code: 'BracketLeft', normal: {eng: '[', mal: 'ഡ', finger: 'R5'}, shifted: {eng: '{', mal: 'ഢ', finger: 'R5'}},
                {code: 'BracketRight', normal: {eng: ']', mal: 'ഏ', finger: 'R5'}, shifted: {eng: '}', mal: 'ഞ', finger: 'R5'}},
                {code: 'Backslash', normal: {eng: '\\', mal: 'ാ', finger: 'R5'}, shifted: {eng: '|', mal: 'ഓ', finger: 'R5'}}
            ],
            // Row 3
            [
                {code: 'CapsLock', normal: {eng: 'Caps', mal: 'Caps', class: 'caps', finger: 'L5'}, shifted: {eng: 'Caps', mal: 'Caps', class: 'caps', finger: 'L5'}},
                {code: 'KeyA', normal: {eng: 'a', mal: 'ക', finger: 'L5'}, shifted: {eng: 'A', mal: 'ഓ', finger: 'L5'}},
                {code: 'KeyS', normal: {eng: 's', mal: 'ഖ', finger: 'L4'}, shifted: {eng: 'S', mal: 'ഏ', finger: 'L4'}},
                {code: 'KeyD', normal: {eng: 'd', mal: 'ഗ', finger: 'L3'}, shifted: {eng: 'D', mal: 'അ', finger: 'L3'}},
                {code: 'KeyF', normal: {eng: 'f', mal: 'ഘ', finger: 'L2'}, shifted: {eng: 'F', mal: 'ഇ', finger: 'L2'}},
                {code: 'KeyG', normal: {eng: 'g', mal: 'ങ', finger: 'L2'}, shifted: {eng: 'G', mal: 'ഉ', finger: 'L2'}},
                {code: 'KeyH', normal: {eng: 'h', mal: 'ച', finger: 'R2'}, shifted: {eng: 'H', mal: 'ഫ', finger: 'R2'}},
                {code: 'KeyJ', normal: {eng: 'j', mal: 'ഛ', finger: 'R2'}, shifted: {eng: 'J', mal: 'റ', finger: 'R2'}},
                {code: 'KeyK', normal: {eng: 'k', mal: 'ജ', finger: 'R3'}, shifted: {eng: 'K', mal: 'ഖ', finger: 'R3'}},
                {code: 'KeyL', normal: {eng: 'l', mal: 'ഝ', finger: 'R4'}, shifted: {eng: 'L', mal: 'ഴ', finger: 'R4'}},
                {code: 'Semicolon', normal: {eng: ';', mal: 'യ', finger: 'R5'}, shifted: {eng: ':', mal: 'ഛ', finger: 'R5'}},
                {code: 'Quote', normal: {eng: "'", mal: 'ട', finger: 'R5'}, shifted: {eng: '"', mal: 'ഠ', finger: 'R5'}},
                {code: 'Enter', normal: {eng: 'Enter', mal: '↵', class: 'enter', finger: 'R5'}, shifted: {eng: 'Enter', mal: '↵', class: 'enter', finger: 'R5'}}
            ],
            // Row 4
            [
                {code: 'ShiftLeft', normal: {eng: 'Shift', mal: 'Shift', class: 'shift', finger: 'L5'}, shifted: {eng: 'Shift', mal: 'Shift', class: 'shift', finger: 'L5'}},
                {code: 'KeyZ', normal: {eng: 'z', mal: 'ട', finger: 'L5'}, shifted: {eng: 'Z', mal: 'എ', finger: 'L5'}},
                {code: 'KeyX', normal: {eng: 'x', mal: 'ഠ', finger: 'L4'}, shifted: {eng: 'X', mal: 'ഒ', finger: 'L4'}},
                {code: 'KeyC', normal: {eng: 'c', mal: 'ഡ', finger: 'L3'}, shifted: {eng: 'C', mal: 'ണ', finger: 'L3'}},
                {code: 'KeyV', normal: {eng: 'v', mal: 'ഢ', finger: 'L2'}, shifted: {eng: 'V', mal: 'ഠ', finger: 'L2'}},
                {code: 'KeyB', normal: {eng: 'b', mal: 'ണ', finger: 'L2'}, shifted: {eng: 'B', mal: 'ല', finger: 'L2'}},
                {code: 'KeyN', normal: {eng: 'n', mal: 'ത', finger: 'R2'}, shifted: {eng: 'N', mal: 'ള', finger: 'R2'}},
                {code: 'KeyM', normal: {eng: 'm', mal: 'ഥ', finger: 'R2'}, shifted: {eng: 'M', mal: 'ശ', finger: 'R2'}},
                {code: 'Comma', normal: {eng: ',', mal: 'ദ', finger: 'R3'}, shifted: {eng: '<', mal: 'ഷ', finger: 'R3'}},
                {code: 'Period', normal: {eng: '.', mal: 'ധ', finger: 'R4'}, shifted: {eng: '>', mal: 'സ', finger: 'R4'}},
                {code: 'Slash', normal: {eng: '/', mal: 'ന', finger: 'R5'}, shifted: {eng: '?', mal: 'ഹ', finger: 'R5'}},
                {code: 'ShiftRight', normal: {eng: 'Shift', mal: 'Shift', class: 'shift', finger: 'R5'}, shifted: {eng: 'Shift', mal: 'Shift', class: 'shift', finger: 'R5'}}
            ],
            // Row 5
            [ {code: 'Space', normal: {eng: 'Space', mal: ' ', class: 'space', finger: 'R1'}, shifted: {eng: 'Space', mal: ' ', class: 'space', finger: 'R1'}} ]
        ];

        function renderKeyboard() {
            const container = document.getElementById('keyboardContainer'); container.innerHTML = '';
            pcKeyboardRows.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'row';
                row.forEach(key => {
                    const btn = document.createElement('button'); 
                    let state = isShiftPressed ? key.shifted : key.normal;
                    btn.className = `key ${state.class || ''}`; btn.id = key.code;
                    btn.innerHTML = state.class ? `<span class="eng-label" style="align-self:center;">${state.eng}</span>` : `<span class="eng-label">${state.eng}</span><span class="mal-label">${state.mal}</span>`;
                    btn.onclick = () => triggerKey(key.code);
                    rowDiv.appendChild(btn);
                });
                container.appendChild(rowDiv);
            });
            updateTargetUI();
        }

        function loadLesson() {
            const list = lessons[currentLang][document.getElementById('lessonSelect').value];
            currentTargetText = list[Math.floor(Math.random() * list.length)]; typedText = '';
            updateTargetUI(); document.getElementById('ribbonDisplay').innerText = '';
        }

        function updateTargetUI() {
            const box = document.getElementById('targetBox'); let progress = typedText.length;
            if (progress >= currentTargetText.length) {
                box.innerHTML = `<span style='color:#22c55e; font-weight:bold;'>Superb! Next line...</span>`;
                setTimeout(loadLesson, 1200); return;
            }
            let typedPart = currentTargetText.substring(0, progress); let nextChar = currentTargetText.charAt(progress); let remaining = currentTargetText.substring(progress + 1);
            box.innerHTML = `<span style="color:#22c55e;">${typedPart}</span><span class="next-char">${nextChar === ' ' ? '␣' : nextChar}</span><span>${remaining}</span>`;

            document.querySelectorAll('.key').forEach(k => k.classList.remove('target-guide'));
            document.querySelectorAll('.finger-node').forEach(f => f.classList.remove('finger-blink'));

            let targetCode = '', fingerId = '', requiresShift = false;
            if (nextChar === ' ') { targetCode = 'Space'; fingerId = 'R1'; }
            else {
                pcKeyboardRows.forEach(row => row.forEach(k => {
                    if (k.normal.eng === nextChar || k.normal.mal === nextChar) { targetCode = k.code; fingerId = k.normal.finger; requiresShift = false; } 
                    else if (k.shifted.eng === nextChar || k.shifted.mal === nextChar) { targetCode = k.code; fingerId = k.shifted.finger; requiresShift = true; }
                }));
            }

            if (targetCode) document.getElementById(targetCode)?.classList.add('target-guide');
            if (fingerId) document.getElementById(fingerId)?.classList.add('finger-blink');
            if (requiresShift) {
                if (fingerId.startsWith('L')) { document.getElementById('ShiftRight')?.classList.add('target-guide'); document.getElementById('R5')?.classList.add('finger-blink'); } 
                else { document.getElementById('ShiftLeft')?.classList.add('target-guide'); document.getElementById('L5')?.classList.add('finger-blink'); }
            }
        }

        function triggerKey(code) {
            if (code === 'Backspace') { typedText = typedText.slice(0, -1); updateTargetUI(); document.getElementById('ribbonDisplay').innerText = typedText; return; }
            if (typedText.length >= currentTargetText.length) return;

            let expected = currentTargetText.charAt(typedText.length);
            let activeKey = null; pcKeyboardRows.forEach(row => row.forEach(k => { if(k.code === code) activeKey = k; }));
            if (!activeKey && code !== 'Space') return;

            let inputChar = code === 'Space' ? ' ' : (isShiftPressed ? (currentLang === 'EN' ? activeKey.shifted.eng : activeKey.shifted.mal) : (currentLang === 'EN' ? activeKey.normal.eng : activeKey.normal.mal));
            const keyEl = document.getElementById(code);

            if (inputChar && (inputChar === expected || (code === 'Space' && expected === ' '))) {
                typedText += expected; updateTargetUI(); document.getElementById('ribbonDisplay').innerText = typedText;
                keyEl?.classList.add('active'); setTimeout(() => keyEl?.classList.remove('active'), 100);
            } else { keyEl?.classList.add('wrong-active'); setTimeout(() => keyEl?.classList.remove('wrong-active'), 150); }
        }

        window.addEventListener('keydown', (e) => { 
            if(e.code === 'Space') e.preventDefault(); 
            if(e.key === 'Shift') { isShiftPressed = true; renderKeyboard(); } 
            else { triggerKey(e.code); }
        });

        window.addEventListener('keyup', (e) => { if(e.key === 'Shift') { isShiftPressed = false; renderKeyboard(); } });

        function setLanguage(lang) { currentLang = lang; document.getElementById('btn-en').classList.toggle('active', lang === 'EN'); document.getElementById('btn-ml').classList.toggle('active', lang === 'ML'); loadLesson(); renderKeyboard(); }
        function resetApp() { typedText = ''; loadLesson(); }
        setTimeout(() => { loadLesson(); renderKeyboard(); }, 200);
    </script>
</body>
</html>
